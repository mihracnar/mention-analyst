<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Mention Analist</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path d='M16,2C8.268,2,2,7.625,2,14.5c0,3.944,2.023,7.464,5.188,9.752L5.25,29l6.5-2.75 c1.362,0.48,2.793,0.75,4.25,0.75c7.732,0,14-5.625,14-12.5S23.732,2,16,2z' fill='%231d9bf0'/><rect x='10' y='14' width='2' height='5' rx='1' fill='white' /><rect x='15' y='11' width='2' height='8' rx='1' fill='white' /><rect x='20' y='15' width='2' height='4' rx='1' fill='white' /></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<!-- stylesheets: load order matters (base → layout → components → views) -->
<link rel="stylesheet" href="assets/css/base.css"/>
<link rel="stylesheet" href="assets/css/layout.css"/>
<link rel="stylesheet" href="assets/css/components.css"/>
<link rel="stylesheet" href="assets/css/views/stats.css"/>
<link rel="stylesheet" href="assets/css/views/network.css"/>
<link rel="stylesheet" href="assets/css/views/info.css"/>
</head>
<body>

<!-- ══════════════════════════════════════════════════
     TOP BAR
     ══════════════════════════════════════════════════ -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="tlogo" id="logo-btn" style="cursor:pointer" title="Mentionlara dön">
      <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" style="display:block">
        <path d="M16,2C8.268,2,2,7.625,2,14.5c0,3.944,2.023,7.464,5.188,9.752
          L5.25,29l6.5-2.75c1.362,0.48,2.793,0.75,4.25,0.75
          c7.732,0,14-5.625,14-12.5S23.732,2,16,2z" fill="#1d9bf0"/>
        <rect x="10" y="14" width="2" height="5" rx="1" fill="white"/>
        <rect x="15" y="11" width="2" height="8" rx="1" fill="white"/>
        <rect x="20" y="15" width="2" height="4" rx="1" fill="white"/>
      </svg>
    </div>
    <div class="ttitle">Mention Analist</div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════
     VIEW: MENTIONS
     ══════════════════════════════════════════════════ -->
<div class="view on" id="view-mentions">

  <!-- sticky controls: tab bar + search + theme pills -->
  <div class="mentions-sticky">

    <div class="tabbar" id="tabbar"></div>

    <div class="sbar">
      <div class="swrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input class="sinput" id="si" placeholder="Tweet, kullanıcı veya keyword…"/>
        <button class="xbtn" id="xb">✕</button>
      </div>
    </div>

    <!-- theme pill bar + pinned clear button -->
    <div class="thbar-outer">
      <div class="thbar" id="thbar"></div>
      <div class="thbar-clr-wrap" id="thbar-clr-wrap">
        <button class="btn-clr" onclick="cTh()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
          Temizle
        </button>
      </div>
    </div>

  </div><!-- /mentions-sticky -->

  <div class="ri" id="ri"></div>
  <div id="feed"></div>
</div>

<!-- ══════════════════════════════════════════════════
     VIEW: STATS
     ══════════════════════════════════════════════════ -->
<div class="view" id="view-stats">
  <div class="sview" id="stats-c"></div>
</div>

<!-- ══════════════════════════════════════════════════
     VIEW: NETWORK
     ══════════════════════════════════════════════════ -->
<div class="view" id="view-network">
  <div class="nview" id="network-c"></div>
</div>

<!-- ══════════════════════════════════════════════════
     VIEW: INFO
     ══════════════════════════════════════════════════ -->
<div class="view" id="view-info">
  <div class="iview" id="info-c"></div>
</div>

<!-- ══════════════════════════════════════════════════
     BOTTOM NAV
     ══════════════════════════════════════════════════ -->
<nav class="bnav">
  <div class="ntab on" id="nav-mentions" onclick="goView('mentions')">
    <div class="nico">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </div>
    <span class="nlbl">Mentionlar</span>
  </div>
  <div class="ntab" id="nav-stats" onclick="goView('stats')">
    <div class="nico">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6"  y1="20" x2="6"  y2="14"/>
      </svg>
    </div>
    <span class="nlbl">İstatistik</span>
  </div>
  <div class="ntab" id="nav-network" onclick="goView('network')">
    <div class="nico">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="5"  r="3"/>
        <circle cx="5"  cy="19" r="3"/>
        <circle cx="19" cy="19" r="3"/>
        <line x1="12" y1="8" x2="5"  y2="16"/>
        <line x1="12" y1="8" x2="19" y2="16"/>
      </svg>
    </div>
    <span class="nlbl">Network</span>
  </div>
  <div class="ntab" id="nav-info" onclick="goView('info')">
    <div class="nico">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 16v-4M12 8h.01"/>
      </svg>
    </div>
    <span class="nlbl">Bilgi</span>
  </div>
</nav>

<!-- ══════════════════════════════════════════════════
     SCRIPTS
     Load order: data → config → state → utils →
                 render/* → actions → init
     ══════════════════════════════════════════════════ -->
<script src="assets/js/data.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/state.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/render/feed.js"></script>
<script src="assets/js/render/stats.js"></script>
<script src="assets/js/render/network.js"></script>
<script src="assets/js/render/info.js"></script>
<script src="assets/js/actions.js"></script>
<script src="assets/js/init.js"></script>

</body>
</html>
